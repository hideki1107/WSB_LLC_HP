<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="合同会社WSBへのお問い合わせページです。" />
  <title>Contact｜合同会社WSB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/sections.css" />
  <link rel="stylesheet" href="./css/components.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="header-nav" aria-label="メニューを開く">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <a class="logo" href="./index.html" aria-label="合同会社WSB ホーム">
        <img class="logo__image" src="./assets/logo.png" alt="WSBロゴ" />
      </a>
      <nav class="nav nav--header" id="header-nav" aria-label="ヘッダーナビゲーション">
        <a href="./index.html#business">事業内容</a>
        <a href="./index.html#profile">企業情報</a>
        <a href="./index.html#access">アクセス</a>
        <a href="./contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <div class="page-layout">
    <aside class="site-sidebar">
      <div class="site-sidebar__inner">
        <a class="logo" href="./index.html" aria-label="合同会社WSB ホーム">
          <img class="logo__image" src="./assets/logo.png" alt="WSBロゴ" />
        </a>
        <nav class="nav nav--sidebar" aria-label="サイドナビゲーション">
          <a href="./index.html#business">事業内容</a>
          <a href="./index.html#profile">企業情報</a>
          <a href="./index.html#access">アクセス</a>
          <a href="./contact.html">Contact</a>
        </nav>
      </div>
    </aside>

    <main>
      <header class="hero">
        <p class="hero__label">Contact</p>
        <h1 class="hero__title"><span class="mark" aria-hidden="true">*</span>お問い合わせ</h1>
        <p class="hero__lead">
          ご相談・ご依頼はお気軽にお問い合わせください。<br />内容を確認のうえ、担当者よりご返信いたします。
        </p>
      </header>

      <section class="section-reveal section-reveal--fade" aria-labelledby="contact-form-heading">
        <form id="contact-form" class="contact-form" novalidate>
          <!-- Web3Forms access key（要設定） -->
          <input type="hidden" name="access_key" value="6b9cf9dc-9621-4efc-8095-e99b26520979" />
          <input type="hidden" name="subject" value="【合同会社WSB】お問い合わせが届きました" />
          <input type="hidden" name="from_name" value="WSB HP お問い合わせフォーム" />
          <!-- スパム対策 -->
          <input type="checkbox" name="botcheck" style="display:none" />

          <div class="form-group">
            <label for="name">お名前 <span class="required">*</span></label>
            <input type="text" id="name" name="name" placeholder="山田 太郎" required />
          </div>

          <div class="form-group">
            <label for="email">メールアドレス <span class="required">*</span></label>
            <input type="email" id="email" name="email" placeholder="example@mail.com" required />
          </div>

          <div class="form-group">
            <label for="inquiry-type">お問い合わせ種別</label>
            <select id="inquiry-type" name="inquiry_type">
              <option value="">選択してください</option>
              <option value="HP作成">HP作成</option>
              <option value="EC作成">EC作成</option>
              <option value="物販">物販</option>
              <option value="アーティスト事業">アーティスト事業</option>
              <option value="その他">その他</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">お問い合わせ内容 <span class="required">*</span></label>
            <textarea id="message" name="message" placeholder="ご相談内容をご記入ください。" required></textarea>
          </div>

          <button type="submit" class="btn-submit">送信する</button>
        </form>

        <div id="form-result"></div>
      </section>


<footer class="site-footer">
        <nav class="footer-nav" aria-label="フッターナビゲーション">
          <a href="./index.html#business">事業内容</a>
          <a href="./index.html#profile">会社概要</a>
          <a href="./index.html#access">アクセス</a>
          <a href="./contact.html">Contact</a>
        </nav>
        <p>© 合同会社WSB</p>
      </footer>
    </main>
  </div>
  <script src="./js/header.js"></script>
  <script src="./js/mobile-menu.js"></script>
  <script src="./js/section-reveal.js"></script>
  <script src="./js/footer.js"></script>
  <script src="./js/contact-form.js"></script>
</body>
</html>
